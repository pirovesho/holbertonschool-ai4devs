openapi: 3.0.0
info:
  title: Expense Mate API
  description: Fully compliant API for Expense Mate with multiple Full CRUD resources and strict error handling.
  version: 1.1.0
servers:
  - url: https://api.expensemate.com/v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Expense:
      type: object
      required: [description, amount, payer_id]
      properties:
        id: { type: string, format: uuid }
        description: { type: string }
        amount: { type: number, minimum: 0.01 }
        payer_id: { type: string, format: uuid }
    Group:
      type: object
      required: [name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    Error:
      type: object
      properties:
        message: { type: string }
        status: { type: integer }

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      summary: User Authentication
      security: []
      responses:
        200: { description: "Success" }
        401: { description: "Unauthorized", content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /groups:
    get:
      summary: Read all groups
      responses:
        200: { description: "Success" }
        401: { description: "Unauthorized" }
    post:
      summary: Create a group
      responses:
        201: { description: "Created" }
        400: { description: "Bad Request" }

  /groups/{id}:
    put:
      summary: Update a group
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: "Updated" }
        404: { description: "Not Found" }
    delete:
      summary: Delete a group
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        204: { description: "Deleted" }
        404: { description: "Not Found" }

  /expenses:
    get:
      summary: Read all expenses (Pagination)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        200: { description: "Success" }
        401: { description: "Unauthorized" }
    post:
      summary: Create an expense
      responses:
        201: { description: "Created" }
        400: { description: "Bad Request" }

  /expenses/{id}:
    get:
      summary: Read single expense
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: "Success" }
        404: { description: "Not Found" }
    put:
      summary: Update an expense
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: "Updated" }
        400: { description: "Bad Request" }
        404: { description: "Not Found" }
    delete:
      summary: Delete an expense
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        204: { description: "Deleted" }
        404: { description: "Not Found" }